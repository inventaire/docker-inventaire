version: '3'
services:
  inventaire:
    build:
      context: ./.
      dockerfile: Dockerfile.inventaire
    ports:
      - "3006:3006"
    volumes:
      - ./inventaire:${PROJECT_ROOT}
    working_dir: ${PROJECT_ROOT}
    environment:
      - 'NODE_ENV=production'
    depends_on:
      elasticsearch:
        condition: service_healthy
    tty: true
    logging:
      options:
        max-size: "10m"
        max-file: "3"
  couchdb:
    image: couchdb:3.4.2
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    volumes:
      - 'couchdb:/opt/couchdb/data'
      - './configs:/opt/couchdb/etc/local.d'
    tty: true
  elasticsearch:
    image: elasticsearch:7.16.2
    environment:
      - 'http.host=0.0.0.0'
      - 'transport.host=127.0.0.1'
      # See https://www.elastic.co/guide/en/elasticsearch/reference/7.16/docker.html
      - 'discovery.type=single-node'
      # Limit memory usage to 1Go,
      # See https://www.elastic.co/guide/en/elasticsearch/reference/current/advanced-configuration.html
      - 'ES_JAVA_OPTS=-Xms1g -Xmx1g'
    volumes:
      - 'elasticsearch:/usr/share/elasticsearch/data'
    ports :
      - '9200:9200'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200" ]
      interval: 20s
      retries: 5
      start_period: 40s
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.nginx
    volumes:
      - ./nginx/snippets:/etc/nginx/snippets
      - ./nginx/templates:/etc/nginx/templates
      - ./certbot/www/:/var/www/certbot/:ro
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PROJECT_ROOT=${PROJECT_ROOT}
      - DOMAIN_NAME=${DOMAIN_NAME}
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/www/:/var/www/certbot/:rw
      - ./certbot/conf/:/etc/letsencrypt/:rw
volumes:
  couchdb:
  elasticsearch:
